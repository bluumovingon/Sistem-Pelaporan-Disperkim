<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIPAWAS DISPERKIM</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Custom Style CSS -->
    {% load static %}
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <style>
        .login-body {
            background: linear-gradient(135deg, #0f1e2e 0%, #1f4e78 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: none;
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            background-color: #1f4e78;
            color: white;
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
        }
        .login-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #ffca28;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .login-form-container {
            padding: 2.5rem 2rem;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="fa-solid fa-helmet-safety"></i>
            </div>
            <h4 class="mb-1 font-weight-bold">SIPAWAS</h4>
            <p class="mb-0 text-white-50" style="font-size: 0.9rem;">Sistem Pelaporan Pengawasan Lapangan</p>
            <span class="badge bg-warning text-dark mt-2 px-3 py-2 font-weight-bold" style="font-size: 0.75rem;">DISPERKIM</span>
        </div>
        
        <div class="login-form-container">
            <!-- Messages / Alerts -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show mb-4" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label" style="font-size: 0.85rem; font-weight: 600; color: #4b5563;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" id="username" class="form-control border-start-0 ps-0" placeholder="Masukkan username" required style="font-size: 0.95rem;">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label" style="font-size: 0.85rem; font-weight: 600; color: #4b5563;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control border-start-0 ps-0" placeholder="Masukkan password" required style="font-size: 0.95rem;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2.5 font-weight-bold shadow-sm" style="background-color: #1f4e78; border-color: #1f4e78; font-size: 0.95rem; border-radius: 8px;">
                    Masuk ke Sistem <i class="fa-solid fa-right-to-bracket ms-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">© 2026 Dinas Perumahan dan Permukiman</small>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
