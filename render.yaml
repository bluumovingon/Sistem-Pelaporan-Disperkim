databases:
  - name: sipawas-db
    databaseName: sipawas
    user: sipawas_user
    plan: free

services:
  - type: web
    name: sipawas-app
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sipawas.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sipawas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://sipawas-app.onrender.com"
